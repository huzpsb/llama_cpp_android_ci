name: Android NDK Weekly Build

on:
  schedule:
    # Runs at 00:00 UTC every Sunday
    - cron: '0 0 * * 0'
  workflow_dispatch: 

jobs:
  build:
    name: Build arm64-v8a SO
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Fetch llama.cpp if missing
        run: |
          if [ ! -d "llama.cpp" ]; then
            echo "llama.cpp directory not found. Cloning from upstream..."
            git clone https://github.com/ggerganov/llama.cpp.git llama.cpp
          fi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27d
          local-cache: true

      - name: Configure CMake
        run: |
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-30 \
            -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release -j$(nproc)

      - name: Strip Shared Library
        run: |
          # 使用 NDK 提供的 llvm-strip 工具移除未使用的符号以减小体积
          # 路径通常位于 toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          STRIP_TOOL=${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip
          echo "Using strip tool: $STRIP_TOOL"
          find build -name "*.so" -exec $STRIP_TOOL --strip-unneeded {} +

      - name: Upload Shared Library (SO)
        uses: actions/upload-artifact@v4
        with:
          name: libbuild_llama-arm64-v8a
          path: build/**/*.so
          if-no-files-found: error
